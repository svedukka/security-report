name: Update Vulnerability Report

on:
  schedule:
    - cron: '0 6 * * *'  # Joka päivä klo 06:00 UTC
  workflow_dispatch:       # Mahdollistaa myös manuaalisen ajon

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate report
        run: python generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update vulnerability report $(date -u '+%Y-%m-%d')"
          git push
